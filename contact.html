<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baobab Bites Café - Contact & Booking</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
    <nav>
    <h2>Baobab Bites Café ☕</h2>
    <ul>
        <li><a href="index.html#hero">Home</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
    </nav>
</header>

<main>
    <section class="hero">
    <h1>Contact Us</h1>
    <p>Book a table or send us a message</p>
    </section>

    <section class="contact-section">
    <h2>Book a Table</h2>
    <form id="bookingForm">
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your name" required class="form-input">
        </div>

        <div class="form-group">
            <label for="phone">Phone:</label>
            <input type="tel" id="phone" name="phone" placeholder="+220 7XX XXXX" required class="form-input">
        </div>

        <div class="form-group">
            <label for="drink">Drink:</label>
            <input type="text" id="drink" name="drink" placeholder="Which drink would you like?" class="form-input">
        </div>

        <div class="form-group">
            <label for="time">Time:</label>
            <input type="time" id="time" name="time" required class="form-input">
        </div>

        <div class="form-group">
            <label for="guests">Guests:</label>
            <input type="number" id="guests" name="guests" min="1" max="20" placeholder="1" required class="form-input">
        </div>

        <div class="form-group">
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="4" placeholder="Any special requests?" class="form-input"></textarea>
        </div>

        <button type="submit" class="btn">Book Now</button>
    </form>

    <div class="visit-us">
        <h2>Visit Us</h2>
        <p class="visit-detail visit-location"><strong>Location:</strong> Brikama Jalangbam, The Gambia</p>
        <p class="visit-detail visit-phone"><strong>Phone:</strong> +220 748 0021</p>
        <p class="visit-detail visit-hours"><strong>Hours:</strong> Mon - Sun: 7:00 AM - 23:00 PM</p>
    </div>
</section>
</main>

<footer>
    <p>&copy; 2026 Baobab Bites Café | Jalangbam, The Gambia</p>
    
    <div class="social-icons">
    <!-- WhatsApp Link -->
    <a href="https://wa.me/2207480021?text=Hi%20Baobab%20Bites!%20I%20would%20like%20to%20book%20a%20table" target="_blank" rel="noopener noreferrer">
        <img src="https://cdn-icons-png.flaticon.com/512/124/124034.png" alt="WhatsApp">
    </a>
    
    <!-- Instagram Link -->
    <a href="https://instagram.com/stisla2021" target="_blank" rel="noopener noreferrer">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram">
    </a>
    </div>

    <p>WhatsApp: +220 748 0021</p>
</footer>

<script>
// Prefill drink from query string when coming from menu
function prefillDrinkFromQuery() {
    const params = new URLSearchParams(window.location.search);
    const drink = params.get('drink');
    if (drink) {
        const drinkInput = document.getElementById('drink');
        if (drinkInput) drinkInput.value = decodeURIComponent(drink.replace(/\+/g, ' '));
        // focus form for convenience
        const form = document.getElementById('bookingForm');
        if (form) form.scrollIntoView({behavior: 'smooth'});
    }
}

document.addEventListener('DOMContentLoaded', function() {
    prefillDrinkFromQuery();

    const form = document.getElementById('bookingForm');
    if (form) {
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const drink = document.getElementById('drink').value.trim() || 'Not specified';
            const time = document.getElementById('time').value.trim();
            const guests = document.getElementById('guests').value.trim();
            const message = document.getElementById('message').value.trim() || 'No extra message';

            const text = `Booking request from ${name}\nPhone: ${phone}\nDrink: ${drink}\nTime: ${time}\nGuests: ${guests}\nNote: ${message}`;
            const phoneNumber = '2207480021';
            const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(text)}`;

            window.open(whatsappUrl, '_blank');
            alert('Your booking details are being prepared in WhatsApp. Please send the message to confirm your booking.');
            form.reset();
        });
    }
});
</script>

</body>
</html>
